# ─────────────────────────────────────────
#  Stellar Dashboard — podman-compose.yml
#  Run with: podman-compose up -d
# ─────────────────────────────────────────
version: "3.8"

services:
  stellar:
    build:
      context: .
      dockerfile: Containerfile
    container_name: stellar-lens
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Change 8080 to whatever port you want on your VPS
      - "127.0.0.1:3000:3000"
    volumes:
      # Keeps the SQLite database alive across restarts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
