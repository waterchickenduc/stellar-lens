<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stellar Lens">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stellar Lens</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    #view-login {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .demo-banner {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .demo-banner-spacer { flex: 1; }
    .demo-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      background: rgba(196,154,60,0.15);
      color: #c49a3c;
      border: 1px solid rgba(196,154,60,0.3);
    }
  </style>
</head>
<body>

<!-- ── DEMO VIEW ───────────────────────────────────────── -->
<div id="view-demo" style="display:none">
  <div class="demo-banner">
    <div style="display:flex;align-items:center;gap:0.5rem">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <ellipse cx="12" cy="12" rx="10" ry="4"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
      <span style="font-weight:600;color:var(--text);font-size:0.9rem">Stellar Lens</span>
      <span style="color:var(--text-muted);font-size:0.8rem">· Fan Dashboard · Stellar Dominion</span>
      <span class="demo-badge">Demo</span>
    </div>
    <div class="demo-banner-spacer"></div>
    <div id="demo-meta" style="font-size:0.8rem;color:var(--text-muted)"></div>
    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="showLoginView()" style="font-size:0.82rem">Sign In</button>
      <a href="/register.html" style="background:var(--primary);color:#fff;padding:0.35rem 0.85rem;border-radius:var(--radius);font-size:0.82rem;text-decoration:none;white-space:nowrap">
        Register →
      </a>
    </div>
  </div>

  <div class="dash-tabbar" style="position:sticky;top:49px;z-index:99">
    <div class="dash-tab" data-tab="overview"    onclick="switchTab('overview')">Overview</div>
    <div class="dash-tab" data-tab="planet"      onclick="switchTab('planet')">Per Planet</div>
    <div class="dash-tab" data-tab="research"    onclick="switchTab('research')">Research</div>
    <div class="dash-tab" data-tab="performance" onclick="switchTab('performance')">Performance</div>
    <div class="dash-tab" data-tab="highscore"   onclick="switchTab('highscore')">Highscore</div>
  </div>

  <div class="dash-content" style="height:auto;overflow:visible;padding:1.75rem 2rem">
    <div id="demo-loading" style="display:flex;align-items:center;justify-content:center;height:40vh;color:var(--text-muted)">
      Loading demo...
    </div>
    <div id="panel-overview"    class="dash-panel"></div>
    <div id="panel-planet"      class="dash-panel"></div>
    <div id="panel-research"    class="dash-panel"></div>
    <div id="panel-performance" class="dash-panel"></div>
    <div id="panel-highscore"   class="dash-panel"></div>
  </div>
</div>

<!-- ── LOGIN VIEW ─────────────────────────────────────── -->
<div id="view-login" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
        <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
      </svg>
      <div>
        <div class="auth-logo-name">Stellar Lens</div>
        <div class="auth-logo-sub">Stellar Dominion Analytics</div>
      </div>
    </div>
    <div class="auth-title">Sign in</div>
    <div class="auth-sub">Enter your credentials to access your dashboard.</div>
    <div id="alert" class="alert"></div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn btn-primary">
      <span class="spinner"></span>
      <span class="btn-label">Sign in</span>
    </button>
    <div class="auth-footer" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
      <span>No account? <a href="/register.html">Register</a></span>
      <span id="back-to-demo-wrap" style="display:none">
        <a href="#" onclick="showDemoView();return false;">← View Demo</a>
      </span>
    </div>
  </div>
</div>

<!-- Load api.js FIRST so its apiFetch is the real one -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/theme.js"></script>

<script>
// ── Override apiFetch AFTER api.js loads ───────────────
// We wrap it to intercept /history calls for the demo
// while keeping all other calls (including login) working normally
var _realApiFetch = apiFetch;
var _publicHistory = [];

apiFetch = async function(path, options) {
  if (path && path.includes('/history')) return { history: _publicHistory };
  return _realApiFetch(path, options);
};
</script>

<!-- Dashboard render scripts use the wrapped apiFetch -->
<script src="/js/dashboard/overview.js"></script>
<script src="/js/dashboard/planet.js"></script>
<script src="/js/dashboard/research.js"></script>
<script src="/js/dashboard/performance.js"></script>
<script src="/js/dashboard/highscore.js"></script>

<script>
initTheme();

var Dash = { snapshot: null, currentAccountId: null };
var _hasDemoData = false;

function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Number(n).toLocaleString();
}

function processHistory(rawHistory) {
  return (rawHistory || []).map(function(h) {
    var d    = h.data || {};
    var cols = d.coloniesData || [];
    var ore = 0, crystal = 0, helium3 = 0;
    cols.forEach(function(c) {
      ore     += (c.production && c.production.ore)     || 0;
      crystal += (c.production && c.production.crystal) || 0;
      helium3 += (c.production && c.production.helium3) || 0;
    });
    return {
      fetched_at:           h.fetched_at,
      production:           { ore: ore, crystal: crystal, helium3: helium3 },
      globalPoints:         d.globalPoints,
      economyPoints:        d.economyPoints,
      researchPoints:       d.researchPoints,
      militaryPoints:       d.militaryPoints,
      defensePoints:        d.defensePoints,
      ranks:                d.ranks,
      level:                d.level,
      totalExpeditions:     d.totalExpeditions,
      totalBattleVictories: d.totalBattleVictories,
      anomalyLevel:         d.anomalyLevel,
    };
  });
}

function switchTab(name) {
  document.querySelectorAll('.dash-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.dash-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (Dash.snapshot) renderTab(name);
}

function renderTab(name) {
  var d = Dash.snapshot;
  if (name === 'overview')    renderOverview(d);
  if (name === 'planet')      renderPlanet(d);
  if (name === 'research')    renderResearch(d);
  if (name === 'performance') renderPerformance();
  if (name === 'highscore')   renderHighscore(d);
}

function showDemoView() {
  if (!_hasDemoData) return;
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-demo').style.display  = 'block';
}

function showLoginView() {
  document.getElementById('view-demo').style.display  = 'none';
  document.getElementById('view-login').style.display = 'flex';
  if (_hasDemoData) document.getElementById('back-to-demo-wrap').style.display = 'inline';
}

function timeSince(iso) {
  var diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)    return diff + 's ago';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function boot() {
  // Already logged in → go straight to dashboard
  if (typeof getToken === 'function' && getToken()) {
    window.location.href = '/dashboard.html';
    return;
  }

  // Try demo — use raw fetch, not apiFetch, to bypass any wrapping
  try {
    var res = await fetch('/api/public/demo');
    if (!res.ok) { showLoginView(); return; }

    var payload = await res.json();
    Dash.snapshot  = payload.data;
    _publicHistory = processHistory(payload.history || []);
    _hasDemoData   = true;

    var hours = payload.public_history_hours || 1;
    var hoursLabel = hours === 1 ? '1 hour' : hours === 168 ? '7 days' : hours + ' hours';
    document.getElementById('demo-meta').innerHTML =
      'Viewing <strong style="color:var(--text)">' + esc(payload.display_name) + '</strong>' +
      ' · Updated ' + timeSince(payload.fetched_at) +
      ' · History: ' + hoursLabel;
    document.title = payload.display_name + ' — Stellar Lens (Demo)';

    document.getElementById('demo-loading').style.display = 'none';
    document.getElementById('view-demo').style.display = 'block';

    var firstTab = document.querySelector('.dash-tab[data-tab="overview"]');
    if (firstTab) firstTab.classList.add('active');
    var firstPanel = document.getElementById('panel-overview');
    if (firstPanel) firstPanel.classList.add('active');
    renderTab('overview');

  } catch(e) {
    showLoginView();
  }
}

// ── Login form ─────────────────────────────────────────
var emailEl = document.getElementById('email');
var passEl  = document.getElementById('password');
var btn     = document.getElementById('loginBtn');
var alertEl = document.getElementById('alert');

async function doLogin() {
  hideAlert(alertEl);
  var email    = emailEl.value.trim();
  var password = passEl.value;
  if (!email || !password) { showError(alertEl, 'Please fill in all fields.'); return; }
  setLoading(btn, true);
  try {
    var data = await API.post('/auth/login', { email: email, password: password }, false);
    API.setToken(data.token);
    API.setUser(data.user);
    window.location.href = '/dashboard.html';
  } catch (err) {
    // ── DEBUG: force the error to be visible ──
    console.error('[LOGIN ERROR]', err);
    console.error('[LOGIN ERROR] message:', err && err.message);
    console.error('[LOGIN ERROR] data:', err && err.data);
    console.error('[LOGIN ERROR] status:', err && err.status);

    var debugMsg = 'LOGIN ERROR\n\n';
    debugMsg += 'message: ' + (err && err.message ? err.message : '(none)') + '\n';
    debugMsg += 'status:  ' + (err && err.status  ? err.status  : '(none)') + '\n';
    debugMsg += 'data:    ' + (err && err.data    ? JSON.stringify(err.data) : '(none)');
    window.alert(debugMsg);
    // ──────────────────────────────────────────

    if (err.data && err.data.unconfirmed) {
      showError(alertEl, 'Please confirm your email first. Check your inbox.');
    } else {
      showError(alertEl, err.message || 'Login failed.');
    }
  } finally {
    setLoading(btn, false);
  }
}

btn.addEventListener('click', doLogin);
[emailEl, passEl].forEach(function(el) {
  el.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
});

boot();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
