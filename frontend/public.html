<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Lens — Shared Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stellar Lens">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
</head>
<body>
<div id="public-banner" style="background:var(--surface);border-bottom:1px solid var(--border);padding:0.6rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:0.5rem">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="10" ry="4"/><line x1="2" y1="12" x2="22" y2="12"/>
    </svg>
    <span style="font-weight:600;color:var(--text);font-size:0.9rem">Stellar Lens</span>
    <span style="color:var(--text-muted);font-size:0.8rem">· Fan Dashboard · Stellar Dominion</span>
  </div>
  <div style="flex:1"></div>
  <div id="banner-meta" style="font-size:0.8rem;color:var(--text-muted)"></div>
  <a href="/register.html" style="background:var(--primary);color:#fff;padding:0.35rem 0.85rem;border-radius:var(--radius);font-size:0.82rem;text-decoration:none;white-space:nowrap">
    Track your own empire →
  </a>
</div>

<div class="dash-tabbar" style="position:sticky;top:0;z-index:99">
  <div class="dash-tab" data-tab="overview"    onclick="switchTab('overview')">Overview</div>
  <div class="dash-tab" data-tab="planet"      onclick="switchTab('planet')">Per Planet</div>
  <div class="dash-tab" data-tab="research"    onclick="switchTab('research')">Research</div>
  <div class="dash-tab" data-tab="performance" onclick="switchTab('performance')">Performance</div>
  <div class="dash-tab" data-tab="highscore"   onclick="switchTab('highscore')">Highscore</div>
</div>

<div class="dash-content" style="height:auto;overflow:visible;padding:1.75rem 2rem">
  <div id="pub-loading" style="display:flex;align-items:center;justify-content:center;height:40vh;color:var(--text-muted)">Loading...</div>
  <div id="pub-error" style="display:none;text-align:center;padding:3rem;color:var(--danger)"></div>
  <div id="panel-overview"    class="dash-panel"></div>
  <div id="panel-planet"      class="dash-panel"></div>
  <div id="panel-research"    class="dash-panel"></div>
  <div id="panel-performance" class="dash-panel"></div>
  <div id="panel-highscore"   class="dash-panel"></div>
</div>

<script src="/js/dashboard/overview.js"></script>
<script src="/js/dashboard/planet.js"></script>
<script src="/js/dashboard/research.js"></script>
<script src="/js/dashboard/performance.js"></script>
<script src="/js/dashboard/highscore.js"></script>
<script>
var Dash = { snapshot: null, currentAccountId: null };

// History pre-processed into the format performance.js expects:
// [ { fetched_at, production: { ore, crystal, helium3 } }, ... ]
var _publicHistory = [];

function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Number(n).toLocaleString();
}

// performance.js calls apiFetch('/api/accounts/.../history?limit=200')
// We intercept that and return our pre-processed history instead.
async function apiFetch(path) {
  if (path.includes('/history')) return { history: _publicHistory };
  var r = await fetch(path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// Convert raw snapshot history (array of {fetched_at, data}) into the
// format performance.js expects: {fetched_at, production:{ore,crystal,helium3}}
function processHistory(rawHistory) {
  return (rawHistory || []).map(function(h) {
    var d    = h.data || {};
    var cols = d.coloniesData || [];
    var ore = 0, crystal = 0, helium3 = 0;
    cols.forEach(function(c) {
      ore     += (c.production && c.production.ore)     || 0;
      crystal += (c.production && c.production.crystal) || 0;
      helium3 += (c.production && c.production.helium3) || 0;
    });
    return {
      fetched_at:           h.fetched_at,
      production:           { ore: ore, crystal: crystal, helium3: helium3 },
      globalPoints:         d.globalPoints,
      economyPoints:        d.economyPoints,
      researchPoints:       d.researchPoints,
      militaryPoints:       d.militaryPoints,
      defensePoints:        d.defensePoints,
      ranks:                d.ranks,
      level:                d.level,
      totalExpeditions:     d.totalExpeditions,
      totalBattleVictories: d.totalBattleVictories,
      anomalyLevel:         d.anomalyLevel,
    };
  });
}

function applyAllowedTabs(allowedTabs) {
  ['overview','planet','research','performance','highscore'].forEach(function(key) {
    var tab = document.querySelector('.dash-tab[data-tab="' + key + '"]');
    if (tab && allowedTabs.indexOf(key) < 0) tab.style.display = 'none';
  });
}

function switchTab(name) {
  document.querySelectorAll('.dash-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.querySelectorAll('.dash-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (Dash.snapshot) renderTab(name);
}

function renderTab(name) {
  var d = Dash.snapshot;
  if (name === 'overview')    renderOverview(d);
  if (name === 'planet')      renderPlanet(d);
  if (name === 'research')    renderResearch(d);
  if (name === 'performance') renderPerformance();
  if (name === 'highscore')   renderHighscore(d);
}

async function init() {
  var token = new URLSearchParams(window.location.search).get('t');
  if (!token) { showError('No share token provided.'); return; }
  try {
    var res = await fetch('/api/public/' + token);
    if (!res.ok) {
      var e = await res.json().catch(function() { return {}; });
      showError(e.error || 'Share link not found or has been disabled.');
      return;
    }
    var payload = await res.json();

    Dash.snapshot  = payload.data;

    // Pre-process history into the format performance.js expects
    _publicHistory = processHistory(payload.history || []);

    var allowed = (Array.isArray(payload.allowed_tabs) && payload.allowed_tabs.length)
      ? payload.allowed_tabs : ['overview','planet','research','performance','highscore'];
    applyAllowedTabs(allowed);

    var hours = payload.public_history_hours || 1;
    var hoursLabel = hours === 1 ? '1 hour' : hours === 168 ? '7 days' : hours + ' hours';
    var ago = timeSincePublic(payload.fetched_at);
    document.getElementById('banner-meta').innerHTML =
      'Viewing <strong style="color:var(--text)">' + esc(payload.display_name) + '</strong>' +
      ' · Updated ' + ago +
      ' · History: ' + hoursLabel +
      ' (' + _publicHistory.length + ' snapshots)';
    document.title = payload.display_name + ' — Stellar Lens';
    document.getElementById('pub-loading').style.display = 'none';

    var firstTab = allowed[0] || 'overview';
    var firstTabEl = document.querySelector('.dash-tab[data-tab="' + firstTab + '"]');
    if (firstTabEl) firstTabEl.classList.add('active');
    var firstPanel = document.getElementById('panel-' + firstTab);
    if (firstPanel) firstPanel.classList.add('active');
    renderTab(firstTab);
  } catch(e) {
    showError('Failed to load: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('pub-loading').style.display = 'none';
  var el = document.getElementById('pub-error');
  el.style.display = 'block';
  el.innerHTML = '<div style="font-size:1.1rem;margin-bottom:0.5rem">⚠ ' + esc(msg) + '</div>' +
    '<a href="/register.html" style="color:var(--primary)">Create your own dashboard →</a>';
}

function timeSincePublic(iso) {
  var diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)    return diff + 's ago';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
