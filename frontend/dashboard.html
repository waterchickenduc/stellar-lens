<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Lens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="dash-layout">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <aside class="dash-sidebar">

    <div class="sidebar-brand">
      <div class="sidebar-brand-name">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-30 12 12)"/>
          <circle cx="12" cy="12" r="2" fill="currentColor"/>
        </svg>
        Stellar Lens
      </div>
      <div class="sidebar-brand-sub">Fan Dashboard · Stellar Dominion</div>
    </div>



    <div class="sidebar-accounts">
      <div class="sidebar-section-label">Active Accounts</div>
      <div id="sidebar-accounts"></div>
    </div>

    <div class="sidebar-footer">
      
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-cogwheel-wrap" id="cogwheel-wrap">
        <button class="sidebar-cogwheel-btn" id="cogwheel-btn" onclick="toggleSidebarMenu()" title="Menu">⚙</button>
        <div class="sidebar-dropdown" id="sidebar-dropdown">
          <div class="dropdown-section">Navigation</div>
          <a href="/settings.html">⚙ Settings</a>
          <a href="/settings.html#panel-accounts">🔗 Linked Accounts</a>

          <div class="dropdown-section">Profile</div>
          <a href="/settings.html#panel-password">🔑 Change Password</a>
          <a href="/settings.html#panel-email">✉ Change Email</a>

          <div class="dropdown-section" id="admin-section" style="display:none">Admin</div>
          <a href="/admin.html" id="admin-dropdown-link" style="display:none">🛡 Admin Panel</a>

          <div class="dropdown-divider"></div>
          <button class="theme-toggle-btn" onclick="toggleTheme();updateThemeLabel()">☀ Light mode</button>
          <button class="danger" onclick="doLogout()">⏻ Sign Out</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────── -->
  <div class="dash-main">

    <!-- Tab bar -->
    <div class="dash-tabbar">
      <div class="dash-tab active" data-tab="overview">Overview</div>
      <div class="dash-tab" data-tab="planet">Per Planet</div>
      <div class="dash-tab" data-tab="research">Research</div>
      <div class="dash-tab" data-tab="performance">Performance</div>
      <div class="dash-tab" data-tab="highscore">Highscore</div>
      <div class="tabbar-spacer"></div>
      <div class="tabbar-actions">
        <span class="last-pull-label" id="last-pull-label"></span>
        <button class="pull-btn" id="pull-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Pull Now
        </button>
      </div>
    </div>

    <!-- Content panels -->
    <div class="dash-content">
      <div id="panel-overview"    class="dash-panel active"></div>
      <div id="panel-planet"      class="dash-panel"></div>
      <div id="panel-research"    class="dash-panel"></div>
      <div id="panel-performance" class="dash-panel"></div>
      <div id="panel-highscore"   class="dash-panel"></div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/dashboard/loader.js"></script>
<script src="/js/dashboard/overview.js"></script>
<script src="/js/dashboard/planet.js"></script>
<script src="/js/dashboard/research.js"></script>
<script src="/js/dashboard/performance.js"></script>
<script src="/js/dashboard/highscore.js"></script>
<script>

  // Boot dashboard
  dashInit();
</script>

<script>
  function toggleSidebarMenu() {
    const btn = document.getElementById('cogwheel-btn');
    const dd  = document.getElementById('sidebar-dropdown');
    if (!btn || !dd) return;
    btn.classList.toggle('open');
    dd.classList.toggle('open');
  }

  document.addEventListener('click', e => {
    const wrap = document.getElementById('cogwheel-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('cogwheel-btn')?.classList.remove('open');
      document.getElementById('sidebar-dropdown')?.classList.remove('open');
    }
  });

  function doLogout() {
    clearSession();
    window.location.href = '/index.html';
  }

  function updateThemeLabel() {
    const theme = localStorage.getItem('stellar_theme') || 'dark';
    document.querySelectorAll('.theme-toggle-btn').forEach(btn => {
      btn.textContent = theme === 'light' ? '🌙 Dark mode' : '☀ Light mode';
    });
  }

  const _cu = getUser();
  if (_cu && _cu.role === 'admin') {
    const al  = document.getElementById('admin-dropdown-link');
    const as_ = document.getElementById('admin-section');
    if (al)  al.style.display  = 'block';
    if (as_) as_.style.display = 'block';
  }

  updateThemeLabel();
</script>

</body>
</html>
